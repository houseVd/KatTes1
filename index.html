<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espas Sekirite - Kat Idantite</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI, sans-serif;
    background: radial-gradient(circle, #1e272e 0%, #0f141c 100%);
    color:#fff;
}

/* LOGIN */
.login-card{
    width:360px;
    padding:35px;
    border-radius:20px;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(14px);
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
    text-align:center;
}

/* CARD CONTAINER */
.secure-container{
    display:none;
    flex-direction:column;
    align-items:center;
}

/* 🔥 PORTRAIT CARD (KANPE) */
.residence-card{
    width:320px;   /* narrower */
    height:520px;  /* taller = portrait */
    padding:20px;
    border-radius:22px;

    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);

    box-shadow:0 25px 60px rgba(0,0,0,0.7);
    position:relative;
    overflow:hidden;

    display:flex;
    flex-direction:column;
}

/* watermark */
.residence-card::before{
    content:"ESPAS SEKIRITE • VERIFIED ID";
    position:absolute;
    font-size:30px;
    font-weight:900;
    opacity:0.06;
    transform:rotate(-25deg);
    top:45%;
    left:5%;
}

/* HEADER */
.card-header{
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.15);
    padding-bottom:10px;
}

.card-header h1{
    font-size:14px;
    margin:0;
    color:#00d2ff;
    text-transform:uppercase;
}

.card-header h2{
    font-size:10px;
    color:#8a99ad;
    letter-spacing:3px;
}

/* BODY STACKED (KANPE STYLE) */
.card-body{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    margin-top:15px;
}

/* PHOTO PORTRAIT */
.user-img{
    width:140px;
    height:170px;
    object-fit:cover;
    object-position:top;
    border-radius:14px;
    border:2px solid rgba(0,210,255,0.5);
}

/* INFO */
.info{
    width:100%;
    text-align:center;
}

.field-title{
    font-size:9px;
    color:#00d2ff;
    text-transform:uppercase;
    margin-top:8px;
}

.field-value{
    font-weight:bold;
    font-size:14px;
    color:#fff;
    text-transform:uppercase;
}

/* FOOTER */
.card-footer{
    margin-top:auto;
    display:flex;
    justify-content:space-between;
    border-top:1px solid rgba(255,255,255,0.1);
    padding-top:10px;
    font-size:11px;
}

.id-number{
    font-family:monospace;
    color:#00d2ff;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-card" id="loginInterface">
    <h2>Espas Sekirite</h2>
    <p>Antre ID + Modpas pou kontinye</p>

    <input id="userID" placeholder="ID">
    <br><br>
    <input id="userPIN" type="password" placeholder="PIN">
    <br><br>

    <button onclick="validateUser()">KONEKTE</button>
    <p id="errorMessage" style="color:red;display:none;">ID oswa modpas pa kòrèk</p>
</div>

<!-- CARD -->
<div class="secure-container" id="cardInterface">

    <div class="residence-card">

        <div class="card-header">
            <h1>EROBLACK FONDATION</h1>
            <h2>CARTE DE RÉSIDENCE</h2>
        </div>

        <div class="card-body">
            <img class="user-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz0TuHToiNWnU1Rbr8ARH2PyhuQf4bHY0DuzbdB2h2vg&s=10">

            <div class="info">
                <div class="field-title">Nom</div>
                <div class="field-value">SOUFFRANT</div>

                <div class="field-title">Prénom</div>
                <div class="field-value">Robens</div>

                <div class="field-title">Nationalité</div>
                <div class="field-value">HT</div>
            </div>
        </div>

        <div class="card-footer">
            <div>Expire: 02/06/2028</div>
            <div class="id-number">RE-849201-HT</div>
        </div>

    </div>

</div>

<script>
function validateUser(){
    let id=document.getElementById("userID").value;
    let pin=document.getElementById("userPIN").value;

    if(id==="40668847@eroblack.com" && pin==="1234"){
        document.getElementById("loginInterface").style.display="none";
        document.getElementById("cardInterface").style.display="flex";
        document.getElementById("errorMessage").style.display="none";
    } else {
        document.getElementById("errorMessage").style.display="block";
    }
}
</script>

</body>
</html>
