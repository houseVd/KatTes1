<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espas Sekirite - Kat Idantite</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI, sans-serif;
    background: radial-gradient(circle, #1e272e 0%, #0f141c 100%);
    color:#fff;
}

/* LOGIN */
.login-card{
    width:360px;
    padding:35px;
    border-radius:20px;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(14px);
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
    text-align:center;
}

.login-card h2{
    font-size:24px;
    background:linear-gradient(45deg,#00d2ff,#3a7bd5);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.login-card p{
    font-size:12px;
    color:#8a99ad;
}

.input-box{
    text-align:left;
    margin-bottom:15px;
}

.input-box label{
    font-size:10px;
    color:#00d2ff;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.05);
    color:#fff;
    outline:none;
}

.input-box input:focus{
    border-color:#00d2ff;
    box-shadow:0 0 10px rgba(0,210,255,0.3);
}

.submit-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00d2ff,#3a7bd5);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

.error-txt{
    color:#ff4d4d;
    font-size:12px;
    display:none;
    margin-top:10px;
}

/* CARD SECTION */
.secure-container{
    display:none;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

/* CARD */
.residence-card{
    width:560px;
    height:330px;
    padding:25px;
    border-radius:20px;

    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);

    box-shadow:0 25px 60px rgba(0,0,0,0.7);
    position:relative;
    overflow:hidden;
}

.residence-card::before{
    content:"ESPAS SEKIRITE • VERIFIED ID";
    position:absolute;
    font-size:38px;
    font-weight:900;
    opacity:0.06;
    transform:rotate(-25deg);
    top:40%;
    left:5%;
}

/* HEADER */
.card-header{
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.15);
    padding-bottom:10px;
    margin-bottom:18px;
}

.card-header h1{
    font-size:16px;
    margin:0;
    color:#00d2ff;
    text-transform:uppercase;
}

.card-header h2{
    font-size:11px;
    color:#8a99ad;
    letter-spacing:3px;
}

/* BODY (AJISTE POZISYON) */
.card-body{
    display:flex;
    gap:20px;
    align-items:flex-start; /* 🔥 AJISTE POZISYON */
}

/* PORTRAIT IMAGE FIX */
.user-img{
    width:120px;
    height:145px;
    object-fit:cover;
    object-position:top; /* 🔥 pou potrè pi klè */
    border-radius:12px;
    border:2px solid rgba(0,210,255,0.5);
}

/* TEXT */
.field-title{
    font-size:9px;
    color:#00d2ff;
    text-transform:uppercase;
}

.field-value{
    font-weight:bold;
    text-transform:uppercase;
    font-size:14px;
    color:#fff;
}

/* FOOTER */
.card-footer{
    position:absolute;
    bottom:15px;
    left:25px;
    right:25px;
    display:flex;
    justify-content:space-between;
    border-top:1px solid rgba(255,255,255,0.1);
    padding-top:10px;
    font-size:11px;
}

.id-number{
    font-family:monospace;
    color:#00d2ff;
    font-weight:bold;
}

.exit-btn{
    padding:10px 18px;
    border-radius:8px;
    border:1px solid rgba(255,77,77,0.3);
    background:transparent;
    color:#ff4d4d;
    cursor:pointer;
}

.exit-btn:hover{
    background:#ff4d4d;
    color:#fff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-card" id="loginInterface">
    <h2>Espas Sekirite</h2>
    <p>Antre ID + Modpas pou kontinye</p>

    <div class="input-box">
        <label>ID ITILIZATÈ</label>
        <input type="text" id="userID">
    </div>

    <div class="input-box">
        <label>MODPAS</label>
        <input type="password" id="userPIN">
    </div>

    <button class="submit-btn" onclick="validateUser()">KONEKTE</button>
    <div class="error-txt" id="errorMessage">ID oswa modpas pa kòrèk</div>
</div>

<!-- CARD -->
<div class="secure-container" id="cardInterface">

    <div class="residence-card">

        <div class="card-header">
            <h1>République Démocratique du Congo</h1>
            <h2>CARTE DE RÉSIDENCE</h2>
        </div>

        <div class="card-body">
            <img class="user-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz0TuHToiNWnU1Rbr8ARH2PyhuQf4bHY0DuzbdB2h2vg&s=10">

            <div>
                <div class="field-title">Nom</div>
                <div class="field-value">SOUFFRANT</div>

                <div class="field-title">Prénom</div>
                <div class="field-value">Robes</div>

                <div class="field-title">Nationalité</div>
                <div class="field-value">HT</div>
            </div>
        </div>

        <div class="card-footer">
            <div>Expire: 02/06/2028</div>
            <div class="id-number">RE-849201-HT</div>
        </div>

    </div>

    <button class="exit-btn" onclick="lockCard()">Dekonekte</button>
</div>

<script>
function validateUser(){
    let id = document.getElementById("userID").value;
    let pin = document.getElementById("userPIN").value;

    if(id === "12345678" && pin === "1234"){
        document.getElementById("loginInterface").style.display="none";
        document.getElementById("cardInterface").style.display="flex";
        document.getElementById("errorMessage").style.display="none";
    } else {
        document.getElementById("errorMessage").style.display="block";
    }
}

function lockCard(){
    document.getElementById("userID").value="";
    document.getElementById("userPIN").value="";
    document.getElementById("cardInterface").style.display="none";
    document.getElementById("loginInterface").style.display="block";
}
</script>

</body>
</html>
