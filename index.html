<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eroblack Member Card</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#1e272e 0%,#0f141c 100%);
color:white;
padding:20px;
}

/* LOGIN */
.login-box{
width:360px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 15px 40px rgba(0,0,0,.5);
text-align:center;
}

.login-box h1{
color:#00d2ff;
margin-bottom:10px;
}

.login-box p{
color:#bfc9d4;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
outline:none;
border-radius:10px;
background:rgba(255,255,255,.08);
color:white;
}

.login-box button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00d2ff;
color:#000;
font-weight:bold;
cursor:pointer;
}

.error{
margin-top:10px;
color:#ff5e5e;
display:none;
}

/* CARD */
.card-container{
display:none;
}

.member-card{
width:340px;
min-height:580px;
border-radius:24px;
overflow:hidden;
background:linear-gradient(135deg,#16202a,#202c38);
border:1px solid rgba(255,255,255,.1);
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

.header{
padding:20px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.1);
}

.header h2{
color:#00d2ff;
font-size:18px;
}

.header p{
font-size:12px;
color:#a8b3c2;
margin-top:5px;
}

.content{
padding:20px;
text-align:center;
}

.photo{
width:140px;
height:170px;
object-fit:cover;
border-radius:15px;
border:2px solid #00d2ff;
}

.label{
margin-top:12px;
font-size:11px;
color:#00d2ff;
text-transform:uppercase;
letter-spacing:1px;
}

.value{
font-size:14px;
font-weight:bold;
padding-bottom:6px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.footer{
padding:15px 20px;
display:flex;
justify-content:space-between;
border-top:1px solid rgba(255,255,255,.1);
font-size:12px;
}

.member-id{
font-family:monospace;
color:#00d2ff;
font-weight:bold;
}

.logout{
width:100%;
padding:12px;
border:none;
background:#ff4d4d;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
<h1>EROBLACK</h1>
<p>Antre ID ak PIN ou</p>

<input type="text" id="userID" placeholder="ID">
<input type="password" id="userPIN" placeholder="PIN">

<button onclick="login()">KONEKTE</button>

<div class="error" id="errorMsg">
ID oswa PIN pa kòrèk
</div>
</div>

<!-- MEMBER CARD -->
<div class="card-container" id="cardContainer">

<div class="member-card">

<div class="header">
<h2>EROBLACK FOUNDATION</h2>
<p>CARTE MEMBRE</p>
</div>

<div class="content">

<img class="photo"
src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz0TuHToiNWnU1Rbr8ARH2PyhuQf4bHY0DuzbdB2h2vg&s=10">

<div class="label">Nom</div>
<div class="value">SOUFFRANT</div>

<div class="label">Prénom</div>
<div class="value">ROBENS</div>

<div class="label">Nationalité</div>
<div class="value">HT</div>

<div class="label">Sexe</div>
<div class="value">M</div>

<div class="label">Adresse</div>
<div class="value">HAÏTI</div>

<div class="label">Téléphone</div>
<div class="value">12345678</div>

</div>

<div class="footer">
<span>Expire: 02/06/2028</span>
<span class="member-id">MB-849201</span>
</div>

<button class="logout" onclick="logout()">
DEKONEKTE
</button>

</div>

</div>

<script>
function login(){

const id=document.getElementById("userID").value;
const pin=document.getElementById("userPIN").value;

if(id==="40668847@eroblack.com" && pin==="1234"){

document.getElementById("loginBox").style.display="none";
document.getElementById("cardContainer").style.display="block";
document.getElementById("errorMsg").style.display="none";

}else{

document.getElementById("errorMsg").style.display="block";

}
}

function logout(){

document.getElementById("cardContainer").style.display="none";
document.getElementById("loginBox").style.display="block";

document.getElementById("userID").value="";
document.getElementById("userPIN").value="";
}
</script>

</body>
</html>
