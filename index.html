<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RROBLACK FONDATION - ID</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #000; }

        .login-card { background: #fff; padding: 30px; border-radius: 8px; border: 1px solid #ccc; text-align: center; width: 300px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #999; border-radius: 3px; }
        .submit-btn { width: 95%; padding: 10px; background: #333; border: none; color: white; cursor: pointer; font-weight: bold; }

        .secure-container { display: none; text-align: center; }

        /* --- STYLE KAT ID OFISYÈL (PLEN NÈT) --- */
        .residence-card {
            width: 450px;
            height: 280px;
            background: #fff;
            border-radius: 5px;
            padding: 20px;
            border: 1px solid #000;
            display: flex;
            gap: 20px;
            text-align: left;
            position: relative;
        }

        .photo-side { width: 120px; display: flex; flex-direction: column; align-items: center; }
        .user-img { width: 120px; height: 145px; border: 1px solid #000; background: #f0f0f0; object-fit: cover; }
        .sign-box { border-bottom: 1px solid #000; margin-top: 15px; width: 100px; font-size: 10px; text-align: center; padding-top: 20px; }

        .info-side { flex-grow: 1; }
        .title-top { font-size: 16px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #000; padding-bottom: 5px; }
        .data-row { margin-bottom: 8px; }
        .label { font-size: 10px; color: #555; text-transform: uppercase; font-weight: bold; }
        .val { font-size: 14px; font-weight: bold; text-transform: uppercase; }

        .exit-btn { margin-top: 20px; background: #eee; border: 1px solid #999; color: #333; padding: 5px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-card" id="loginInterface">
        <h2>RROBLACK LOGIN</h2>
        <input type="text" id="userID" placeholder="ID">
        <input type="password" id="userPIN" placeholder="PIN">
        <button class="submit-btn" onclick="validateUser()">CONNEXION</button>
    </div>

    <div class="secure-container" id="cardInterface">
        <div class="residence-card">
            <div class="photo-side">
                <img class="user-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz0TuHToiNWnU1Rbr8ARH2PyhuQf4bHY0DuzbdB2h2vg&s=10" alt="Profile">
                <div class="sign-box">FIRMA</div>
            </div>
            <div class="info-side">
                <div class="title-top">RROBLACK FONDATION</div>
                <div class="data-row"><div class="label">RUN / ROL</div><div class="val">84.920.100-K</div></div>
                <div class="data-row"><div class="label">APELLIDOS</div><div class="val">SOUFFRANT</div></div>
                <div class="data-row"><div class="label">NOMBRES</div><div class="val">ROBES</div></div>
                <div class="data-row"><div class="label">NACIONALIDAD</div><div class="val">HAITIANA</div></div>
                <div class="data-row"><div class="label">FECHA DE NACIMIENTO</div><div class="val">10.01.1995</div></div>
            </div>
        </div>
        <button class="exit-btn" onclick="lockCard()">DÉCONNECTER</button>
    </div>

    <script>
        function validateUser() {
            if (document.getElementById("userID").value === "12345678" && document.getElementById("userPIN").value === "1234") {
                document.getElementById("loginInterface").style.display = "none";
                document.getElementById("cardInterface").style.display = "block";
            } else { alert("Accès refusé"); }
        }
        function lockCard() {
            document.getElementById("loginInterface").style.display = "block";
            document.getElementById("cardInterface").style.display = "none";
        }
    </script>
</body>
</html>
