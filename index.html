<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RROBLACK FONDATION - Accès</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        /* --- LOGO / STYLE RROBLACK --- */
        .login-card {
            background: #111;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #333;
            text-align: center;
            width: 300px;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }

        .submit-btn {
            width: 100%;
            padding: 10px;
            background: #ff0000;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- KAT VÈTIKAL AVÈK EFÈ NÉON --- */
        .secure-container { display: none; }

        .residence-card {
            width: 320px;
            height: 500px;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0000 100%);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            border: 2px solid #ff0000;
            /* Efè Néon */
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4), inset 0 0 10px rgba(255, 0, 0, 0.2);
            text-align: center;
        }

        .rro-header {
            font-size: 24px;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 20px;
            border-bottom: 1px solid #ff0000;
            padding-bottom: 10px;
        }

        .user-img {
            width: 150px;
            height: 180px;
            border: 2px solid #ff0000;
            margin-bottom: 15px;
            filter: grayscale(100%) contrast(1.2);
        }

        .info-group {
            text-align: left;
            margin-top: 15px;
        }

        .label { font-size: 10px; color: #ff0000; text-transform: uppercase; }
        .val { font-size: 16px; font-weight: bold; margin-bottom: 10px; display: block; }

        .exit-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 5px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-card" id="loginInterface">
        <h2>RROBLACK LOGIN</h2>
        <input type="text" id="userID" placeholder="ID">
        <input type="password" id="userPIN" placeholder="PIN">
        <button class="submit-btn" onclick="validateUser()">CONNEXION</button>
        <div id="errorMessage" style="color:red; display:none; margin-top:10px;">Accès Refusé</div>
    </div>

    <div class="secure-container" id="cardInterface">
        <div class="residence-card">
            <div class="rro-header">RROBLACK FOUNDATION</div>
            <img class="user-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz0TuHToiNWnU1Rbr8ARH2PyhuQf4bHY0DuzbdB2h2vg&s=10" alt="Profile">
            
            <div class="info-group">
                <span class="label">Identity</span>
                <span class="val">SOUFFRANT, Robes</span>
                <span class="label">Status</span>
                <span class="val" style="color: #ff0000;">PERMANENT MEMBER</span>
                <span class="label">ID Number</span>
                <span class="val">RRO-849201-HT</span>
            </div>
        </div>
        <center><button class="exit-btn" onclick="lockCard()">DÉCONNECTER</button></center>
    </div>

    <script>
        function validateUser() {
            if (document.getElementById("userID").value === "12345678" && document.getElementById("userPIN").value === "1234") {
                document.getElementById("loginInterface").style.display = "none";
                document.getElementById("cardInterface").style.display = "block";
            } else {
                document.getElementById("errorMessage").style.display = "block";
            }
        }
        function lockCard() {
            document.getElementById("loginInterface").style.display = "block";
            document.getElementById("cardInterface").style.display = "none";
        }
    </script>
</body>
</html>
