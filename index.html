<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Kat Idantite RROBLACK</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* Ankadreman telefòn an mòd pòtrè */
        .phone-frame {
            width: 400px;
            height: 750px;
            background: #000;
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 8px solid #333;
        }
        
        .id-card {
            width: 330px;
            height: 550px;
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .flag { width: 60px; height: 40px; background: linear-gradient(to bottom, #00209F 50%, #D21034 50%); border: 1px solid #000; }

        .header { text-align: center; border-bottom: 2px solid #000; width: 100%; }
        .header h1 { margin: 0; font-size: 18px; text-transform: uppercase; }
        .header p { margin: 2px 0 5px 0; font-size: 10px; }
        
        .photo { 
            width: 160px; 
            height: 200px; 
            border: 1px solid #000; 
            background: url('https://f4.bcbits.com/img/a2694881193_16.jpg');
            background-size: cover;
            background-position: center;
        }
        
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; }
        .field { margin-bottom: 5px; }
        .label { font-size: 9px; font-weight: bold; color: #555; text-transform: uppercase; }
        .val { font-size: 13px; font-weight: bold; border-bottom: 1px solid #ccc; padding: 2px 0; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="id-card">
        <div class="header">
            <h1>RROBLACK FONDATION</h1>
            <p>CARTE D'IDENTITÉ / IDENTITY CARD</p>
        </div>
        
        <div class="flag"></div>
        <div class="photo" contenteditable="true"></div>
        <div style="font-style: italic; font-size: 12px;" contenteditable="true">Robes.S</div>
        
        <div class="info-grid">
            <div class="field"><div class="label">NOM / SURNAME</div><div class="val" contenteditable="true">SOUFFRANT</div></div>
            <div class="field"><div class="label">PRÉNOMS / GIVEN NAMES</div><div class="val" contenteditable="true">ROBES</div></div>
            <div class="field"><div class="label">SEXE</div><div class="val" contenteditable="true">M</div></div>
            <div class="field"><div class="label">NATIONALITÉ</div><div class="val">HAITIENNE</div></div>
            <div class="field"><div class="label">DATE DE NAISSANCE</div><div class="val" contenteditable="true">10.01.1995</div></div>
            <div class="field"><div class="label">N° DU DOCUMENT</div><div class="val" style="color:red;" contenteditable="true">RRO-849201</div></div>
        </div>
    </div>
</div>

</body>
</html>
