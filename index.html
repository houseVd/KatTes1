<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RROBLACK FONDATION - ID</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }

        .login-card { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        .submit-btn { width: 95%; padding: 10px; background: #ff0000; border: none; color: white; cursor: pointer; font-weight: bold; }

        .secure-container { display: none; text-align: center; }

        /* --- STYLE KAT ID CHILI --- */
        .residence-card {
            width: 450px;
            height: 280px;
            background: linear-gradient(135deg, #1a0000 0%, #000 100%);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
            display: flex;
            gap: 20px;
            text-align: left;
        }

        .photo-side { width: 120px; }
        .user-img { width: 120px; height: 150px; border: 2px solid #ff0000; object-fit: cover; }
        .sign-box { border-top: 1px dashed #ff0000; margin-top: 10px; font-size: 10px; color: #ff0000; text-align: center; padding-top: 5px; }

        .info-side { flex-grow: 1; }
        .title-rro { color: #ff0000; font-size: 18px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #ff0000; }
        .data-row { margin-bottom: 8px; }
        .label { font-size: 9px; color: #aaa; text-transform: uppercase; }
        .val { font-size: 14px; font-weight: bold; }

        .exit-btn { margin-top: 20px; background: transparent; border: 1px solid #ff0000; color: #ff0000; padding: 5px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-card" id="loginInterface">
        <h2>RROBLACK LOGIN</h2>
        <input type="text" id="userID" placeholder="ID (12345678)">
        <input type="password" id="userPIN" placeholder="PIN (1234)">
        <button class="submit-btn" onclick="validateUser()">CONNEXION</button>
    </div>

    <div class="secure-container" id="cardInterface">
        <div class="residence-card">
            <div class="photo-side">
                <img class="user-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz0TuHToiNWnU1Rbr8ARH2PyhuQf4bHY0DuzbdB2h2vg&s=10" alt="Profile">
                <div class="sign-box">FIRMA DEL TITULAR</div>
            </div>
            <div class="info-side">
                <div class="title-rro">CÉDULA DE IDENTIDAD - RROBLACK</div>
                <div class="data-row"><div class="label">N° ROL</div><div class="val">84.920.100-K</div></div>
                <div class="data-row"><div class="label">APELLIDOS</div><div class="val">SOUFFRANT</div></div>
                <div class="data-row"><div class="label">NOMBRES</div><div class="val">ROBES</div></div>
                <div class="data-row"><div class="label">NACIONALIDAD</div><div class="val">HAITIANA</div></div>
                <div class="data-row"><div class="label">FECHA DE NACIMIENTO</div><div class="val">10.01.1995</div></div>
            </div>
        </div>
        <button class="exit-btn" onclick="lockCard()">SALIR</button>
    </div>

    <script>
        function validateUser() {
            if (document.getElementById("userID").value === "12345678" && document.getElementById("userPIN").value === "1234") {
                document.getElementById("loginInterface").style.display = "none";
                document.getElementById("cardInterface").style.display = "block";
            } else { alert("Accès refusé"); }
        }
        function lockCard() {
            document.getElementById("loginInterface").style.display = "block";
            document.getElementById("cardInterface").style.display = "none";
        }
    </script>
</body>
</html>
